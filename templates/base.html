<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HSK 학습 분석기{% endblock %}</title>
    <style>
        :root {
            --bg-primary: #fefefe;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --accent: #e94560;
            --accent-light: #fff0f3;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --pos-noun: #2e86ab;
            --pos-verb: #e94560;
            --pos-adj: #f18f01;
            --pos-adv: #7b2d8e;
            --pos-prep: #44803f;
            --pos-conj: #c73e1d;
            --pos-particle: #888;
            --pos-measure: #2e5090;
            --pos-pronoun: #0f7173;
            --pos-interj: #d4a373;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --border: #333;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --accent-light: #2a1a2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 30px;
        }
        .header h1 { font-size: 1.8em; color: var(--accent); }
        .header .subtitle { color: var(--text-secondary); margin-top: 5px; }
        .theme-toggle {
            position: fixed; top: 15px; right: 15px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 50%; width: 40px; height: 40px;
            cursor: pointer; font-size: 1.2em;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); z-index: 100;
        }
        .sentence-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .sentence-number {
            display: inline-block;
            background: var(--accent);
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            text-align: center; line-height: 32px;
            font-weight: bold; font-size: 0.9em;
            margin-bottom: 12px;
        }
        .chinese-text {
            font-size: 1.6em;
            line-height: 2.8;
            margin: 15px 0;
            letter-spacing: 2px;
        }
        ruby { ruby-position: over; }
        rt {
            font-size: 0.45em;
            color: var(--accent);
            font-weight: normal;
            letter-spacing: 0;
        }
        .pinyin-line {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 12px;
            font-style: italic;
        }
        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.95em;
        }
        .word-table th {
            background: var(--bg-secondary);
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        .word-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .word-table tr:hover { background: var(--accent-light); }
        .pos-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            color: white;
            font-weight: 500;
        }
        .pos-명사 { background: var(--pos-noun); }
        .pos-동사 { background: var(--pos-verb); }
        .pos-형용사 { background: var(--pos-adj); }
        .pos-부사 { background: var(--pos-adv); }
        .pos-전치사 { background: var(--pos-prep); }
        .pos-접속사 { background: var(--pos-conj); }
        .pos-조사 { background: var(--pos-particle); }
        .pos-양사 { background: var(--pos-measure); }
        .pos-대사 { background: var(--pos-pronoun); }
        .pos-감탄사 { background: var(--pos-interj); }
        .pos-조동사 { background: #c73e1d; }
        .pos-수사 { background: #2e5090; }
        .pos-구두점 { background: #ccc; color: #333; }
        .translation {
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
        }
        .translation-label {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        .translation-literal {
            background: transparent;
            border-left: 4px solid var(--border);
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
        }
        .translation-literal .translation-label {
            color: var(--text-secondary);
        }
        .grammar-section { margin: 12px 0; }
        .grammar-section details {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .grammar-section summary {
            padding: 10px 16px;
            background: var(--bg-secondary);
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
        }
        .grammar-section summary:hover { background: var(--accent-light); }
        .grammar-content { padding: 12px 16px; }
        .grammar-example {
            font-style: italic;
            color: var(--text-secondary);
            margin-top: 8px;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }
        .difficulty-note {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 0.9em;
        }
        [data-theme="dark"] .difficulty-note {
            background: #2a2a1e;
            border-color: #555;
        }
        .section-label {
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 16px 0 8px 0;
            letter-spacing: 1px;
        }
        .track-list { list-style: none; }
        .track-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .track-item:hover { background: var(--accent-light); }
        .track-item a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            flex: 1;
        }
        .track-item a:hover { color: var(--accent); }
        .sentence-count {
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        .nav-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-link:hover { text-decoration: underline; }
        .full-transcription {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 1.1em;
            line-height: 2;
        }
        .full-transcription summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
        }
        /* 오디오 플레이어 */
        .audio-player {
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 10px;
            z-index: 50;
        }
        .audio-label {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .audio-player audio {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .audio-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .audio-controls button {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .audio-controls button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .audio-controls button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .sentence-card { padding: 16px; }
            .chinese-text { font-size: 1.3em; }
            .word-table { font-size: 0.85em; }
            .word-table th, .word-table td { padding: 6px 8px; }
        }
        @media print {
            .theme-toggle { display: none; }
            body { max-width: 100%; }
            .sentence-card { break-inside: avoid; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="다크/라이트 모드">&#x1f313;</button>
    {% block content %}{% endblock %}
    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? '' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('hsk-theme', next || 'light');
        }
        (function() {
            if (localStorage.getItem('hsk-theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        // 오디오 배속 조절
        function changeSpeed(speed) {
            var audio = document.getElementById('main-audio');
            if (!audio) return;
            audio.playbackRate = speed;
            document.querySelectorAll('.audio-controls button').forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.textContent.trim() === speed + 'x') {
                    btn.classList.add('active');
                }
            });
        }

        // 되감기
        function rewind(sec) {
            var audio = document.getElementById('main-audio');
            if (!audio) return;
            audio.currentTime = Math.max(0, audio.currentTime - sec);
        }

        // 앞으로
        function forward(sec) {
            var audio = document.getElementById('main-audio');
            if (!audio) return;
            audio.currentTime = Math.min(audio.duration, audio.currentTime + sec);
        }
    </script>
</body>
</html>
